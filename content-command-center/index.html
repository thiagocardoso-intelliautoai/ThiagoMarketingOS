<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thiago Marketing OS — Dashboard visual para orquestrar squads de conteúdo LinkedIn" />
  <title>Thiago Marketing OS</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%221%22 y2=%221%22><stop offset=%220%25%22 stop-color=%22%2314B8A6%22/><stop offset=%22100%25%22 stop-color=%22%230D9488%22/></linearGradient></defs><path d=%22M13 2L3 14h9l-1 8 10-12h-9l1-8z%22 fill=%22url(%23g)%22/></svg>" />
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header class="header" role="banner">
    <div class="header-left">
      <a href="#dashboard" class="header-logo">
        <svg class="logo-bolt" viewBox="0 0 24 24" width="24" height="24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="url(#bolt-grad)" stroke="none"/><defs><linearGradient id="bolt-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#14B8A6"/><stop offset="100%" stop-color="#0D9488"/></linearGradient></defs></svg>
        <span class="logo-text"><strong>Thiago</strong> <span class="logo-descriptor">Marketing OS</span></span>
      </a>
    </div>
    <nav class="header-nav" role="navigation" aria-label="Navegação principal">
      <a href="#dashboard" class="nav-link nav-active" id="nav-dashboard">
        <svg viewBox="0 0 24 24"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a1 1 0 0 1 3 3l-9.013 9.014a2 2 0 0 1-.853.505l-2.873.84a.5.5 0 0 1-.62-.62l.84-2.873a2 2 0 0 1 .506-.852z"/></svg>
        Create
      </a>
      <a href="#conteudos" class="nav-link" id="nav-conteudos">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/></svg>
        Conteúdos
        <span class="nav-badge" id="library-badge">0</span>
      </a>
    </nav>
    <button class="settings-trigger" id="settings-trigger" aria-label="Configurações" title="Configurações">
      <svg viewBox="0 0 24 24" width="20" height="20">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- ─── MAIN CONTENT ─── -->
  <main class="main-container" id="main-content" role="main">
    <!-- Rendered by JS -->
  </main>

  <!-- ─── MODAL OVERLAY ─── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-container" id="modal-content">
      <!-- Modal content injected by JS -->
    </div>
  </div>

  <!-- Settings page is rendered dynamically by JS into #main-content -->

  <!-- ─── TOAST CONTAINER ─── -->
  <div class="toast-container" id="toast-container" role="alert" aria-live="polite"></div>

  <!-- ─── JS MODULES ─── -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
