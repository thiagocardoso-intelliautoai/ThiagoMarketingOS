# Workflow: Criar Matéria-Colab (Briefing Editorial)
# Pipeline: ângulo aprovado → briefing-editorial.md pronto pra carrosseis-linkedin
# v2.0 — squad reposicionado como estratégico-editorial

name: criar-materia-colab
version: "2.0"
description: >
  Pipeline linear para produzir briefing editorial estratégico a partir de ângulo
  aprovado. Squad é puramente estratégico-editorial: formula tese, define esqueleto
  narrativo (tese-primeiro, personagem-evidência, fechamento-tese), aprova evidências
  com lastro, aplica vetos editoriais (com destaque pro teste de remoção do nome).
  Output alimenta `carrosseis-linkedin` no fluxo "matéria-colab" (estilo Editorial
  Clean), pulando generate-angles e adaptando create-copy. NÃO escreve copy de slide,
  caption, hashtags, hook formatado, contagem de slides, nem DM.

# ─── PIPELINE LINEAR ──────────────────────────────────────
#
# step-00 (input) → step-01 (pesquisar) → step-02 (estruturar)
# → step-03 (finalizar-briefing) → step-04 (review) → step-05 (aprovação)
#
# 2 checkpoints humanos: step-00 (input) e step-05 (aprovação final)
# ────────────────────────────────────────────────────────────

steps:

  # ─── INPUT ────────────────────────────────────────────────
  - id: step-00-input
    name: "⏸️ CHECKPOINT — Receber Input"
    type: human-checkpoint
    description: >
      Thiago fornece:
      1. Nome da pessoa (sujeito do briefing — evidência viva da tese)
      2. Ângulo específico aprovado (arquétipo + título pela lente + evidências + risco)
      3. Input livre (opcional — ex: "foca no case X", "tom mais duro")
    output: input-completo
    next: step-01-pesquisar

  # ─── PESQUISAR PROFUNDIDADE ──────────────────────────────
  - id: step-01-pesquisar
    name: "Pesquisar Pessoa em Profundidade"
    agent: investigador-materia
    task: tasks/01-pesquisar-profundidade.md
    data:
      - data/linkedin-strategy.md
      - data/formato-materia-colab.md
      - data/atomos-estrategicos.md
    input: input-completo
    output: output/dossie-{slug}.md
    description: >
      Ivan Investigador pesquisa a pessoa além do que o seed entregou.
      Posts recentes (30 dias), cases documentados, citações literais
      verificáveis, contexto de mercado, contradições. Entrega dossiê
      auto-suficiente com fontes.
    next: step-02-estruturar

  # ─── ESTRUTURAR NARRATIVA ────────────────────────────────
  - id: step-02-estruturar
    name: "Estruturar Narrativa (Tese-primeiro)"
    agent: redator-materia
    task: tasks/02-estruturar-narrativa.md
    data:
      - data/linkedin-strategy.md
      - data/formato-materia-colab.md
      - data/atomos-estrategicos.md
      - data/veto-conditions.md
    input:
      - output/dossie-{slug}.md
      - input-completo
    output: estrutura-narrativa
    description: >
      Rita formula a tese (frase única) e monta esqueleto narrativo de 5 blocos
      na ordem inegociável: (1) abertura = tese, (2) tese desenvolvida, (3) personagem
      como evidência, (4) lacuna ancorada, (5) fechamento volta à tese.
      Auto-check do Veto 1 (teste de remoção do nome) ao final.
    next: step-03-finalizar-briefing

  # ─── FINALIZAR BRIEFING ──────────────────────────────────
  - id: step-03-finalizar-briefing
    name: "Finalizar Briefing Editorial"
    agent: redator-materia
    task: tasks/03-finalizar-briefing.md
    data:
      - data/atomos-estrategicos.md
      - data/veto-conditions.md
      - data/formato-materia-colab.md
    templates:
      - templates/materia-template.md
    input:
      - estrutura-narrativa
      - output/dossie-{slug}.md
    output: output/briefing-editorial-{slug}-{angulo}.md
    description: >
      Rita consolida tese + ângulo + evidências + esqueleto + lente + risco
      + estilo no briefing-editorial.md final. NÃO escreve copy de slide,
      caption, hashtags, hook formatado, contagem de slides, DM, nem headlines
      alternativas — fronteira clara com `carrosseis-linkedin`.
    next: step-04-review

  # ─── REVIEW ──────────────────────────────────────────────
  - id: step-04-review
    name: "Auto-Review Editorial (Veto 1 primeiro)"
    agent: redator-materia
    task: tasks/04-review-briefing.md
    data:
      - data/veto-conditions.md
      - data/atomos-estrategicos.md
      - data/formato-materia-colab.md
    input: output/briefing-editorial-{slug}-{angulo}.md
    output: output/briefing-editorial-{slug}-{angulo}.md
    description: >
      Rita roda auto-review. PRIMEIRO check: Veto 1 (teste de remoção do nome).
      Se disparar → volta pra Etapa 02. Depois verifica vetos 2-6 (citações com
      fonte, sem entrevista, sem tom de parceria, Editorial Clean declarado, risco
      endereçado). Verifica fronteira (anti-invasão de carrosseis-linkedin).
    next: step-05-aprovacao

  # ─── APROVAÇÃO FINAL ─────────────────────────────────────
  - id: step-05-aprovacao
    name: "⏸️ CHECKPOINT — Aprovação do Briefing"
    type: human-checkpoint
    description: >
      Thiago revisa briefing-editorial.md. Decide:
      ✅ Aprovar (alimenta `carrosseis-linkedin` no fluxo matéria-colab)
      🔄 Ajustes (com indicações específicas — Etapa 02 ou 03)
    input: output/briefing-editorial-{slug}-{angulo}.md
    output: briefing-aprovado

# ─── Resumo do Pipeline ───────────────────────────────────
# step-00 (input) → step-01 (pesquisar) → step-02 (estruturar)
# → step-03 (finalizar-briefing) → step-04 (review) → step-05 (aprovação)

# ─── Checkpoints ──────────────────────────────────────────
# step-00: Receber ângulo aprovado + input livre do Thiago
# step-05: Aprovação final do briefing editorial

# ─── Handoff downstream ──────────────────────────────────
# Briefing aprovado alimenta `carrosseis-linkedin` no fluxo "matéria-colab":
#   - Pula step-02-generate-angles (ângulo já aprovado upstream)
#   - Adapta step-04-create-copy pra ler briefing-editorial.md e respeitar
#     o esqueleto narrativo obrigatório (tese-primeiro, personagem-evidência,
#     fechamento-tese)
#   - Trava estilo visual em Editorial Clean (assinatura da série)
