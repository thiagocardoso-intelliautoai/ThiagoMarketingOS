# Squad: Criar Matéria-Colab (Briefing Editorial)
# Pipeline: ângulo aprovado → briefing-editorial.md → carrosseis-linkedin (Editorial Clean)
# v2.0 — squad reposicionado como puramente estratégico-editorial

name: "Criar Matéria-Colab"
code: criar-materia-colab
icon: 📝
version: "2.0"
format: aiox-v1

description: >
  Squad estratégico-editorial. Recebe ângulo aprovado de seed-lista-distribuicao
  + nome da pessoa + input livre opcional do Thiago. Pesquisa em profundidade,
  formula a tese, monta esqueleto narrativo (tese-primeiro, personagem-evidência,
  fechamento-tese), aplica vetos editoriais (com destaque pro teste de remoção do
  nome). Output é briefing-editorial.md que alimenta `carrosseis-linkedin` no fluxo
  matéria-colab (estilo Editorial Clean). NÃO escreve copy de slide, caption,
  hashtags, hook formatado, contagem de slides, DM, nem headlines alternativas —
  isso é trabalho de `carrosseis-linkedin`.

owner: thiago-clima
platform: linkedin
content_type: briefing-editorial
upstream_squad: seed-lista-distribuicao
downstream_squad: carrosseis-linkedin

# Agentes da squad
agents:
  - id: investigador-materia
    name: "Ivan Investigador"
    file: agents/investigador-materia.md
    description: Pesquisador de profundidade — vai além do que o seed entregou, levanta citações verificáveis e contexto público
    skills: [web_search, web_fetch]

  - id: redator-materia
    name: "Rita Estratégista-Editorial"
    file: agents/redator-materia.md
    description: Estratégista-editorial — formula tese, monta esqueleto narrativo, ancora evidências, aplica vetos editoriais (especialmente teste de remoção do nome)

# Workflow principal
workflow:
  entry: workflows/workflow.yaml

# Dados de referência
data:
  - data/linkedin-strategy.md
  - data/formato-materia-colab.md
  - data/atomos-estrategicos.md
  - data/veto-conditions.md

# Templates de output
templates:
  - id: briefing-template
    file: templates/materia-template.md
    description: Template do briefing editorial estruturado em 9 seções

# Tasks
tasks:
  - id: pesquisar-profundidade
    file: tasks/01-pesquisar-profundidade.md
    description: Pesquisar a pessoa em profundidade além do seed — posts, cases, citações verificáveis

  - id: estruturar-narrativa
    file: tasks/02-estruturar-narrativa.md
    description: Formular tese (frase única) e montar esqueleto narrativo de 5 blocos na ordem inegociável (tese-primeiro, personagem-evidência, fechamento-tese)

  - id: finalizar-briefing
    file: tasks/03-finalizar-briefing.md
    description: Consolidar tese + ângulo + evidências + esqueleto + lente + risco + estilo no briefing-editorial.md final

  - id: review-briefing
    file: tasks/04-review-briefing.md
    description: Auto-review com Veto 1 (teste de remoção do nome) primeiro, depois vetos 2-6, depois fronteira anti-invasão

# Checkpoints humanos
checkpoints:
  - step-00: "Receber ângulo aprovado + input livre do Thiago"
  - step-05: "Aprovação final do briefing editorial"
