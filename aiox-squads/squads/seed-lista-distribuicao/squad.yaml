# Squad: Seed Lista de Distribuição
# Pipeline de pesquisa e manutenção de alvos para matéria-colab
# 2 modos: Pesquisar Candidatos Novos (01→04) | Aprofundar Pessoa Existente (A1→A2→03→04)

name: "Seed Lista de Distribuição"
code: seed-lista-distribuicao
icon: 🎯
version: "1.1"
format: aiox-v1

description: >
  Squad para pesquisar, sugerir e manter a lista de alvos para matéria-colab.
  Pesquisa LinkedIn/web por candidatos cuja rede inclui o ICP, aplica o gate
  da lente com ângulos distintos (arquétipo + título + evidências + risco)
  e filtra por arquétipos de exclusão. Suporta dois modos: pesquisar candidatos
  novos e aprofundar ângulos em pessoa já aprovada.

owner: thiago-clima
platform: linkedin
content_type: strategy-seed

# Agente da squad
agents:
  - id: pesquisador-alvos
    name: "Paulo Prospector"
    file: agents/pesquisador-alvos.md
    description: Pesquisador de alvos para matéria-colab — pesquisa, aplica gate da lente com ângulos, filtra exclusões, aprofunda pessoas existentes
    skills: [web_search, web_fetch]

# Workflow principal
workflow:
  entry: workflows/workflow.yaml

# Dados de referência
data:
  - data/linkedin-strategy.md
  - data/exclusions.md
  - data/gate-rules.md

# Templates de output
templates:
  - id: candidato-template
    file: templates/candidato-template.md
    description: Template de candidato pesquisado com ângulos (arquétipo + título + evidências + risco)

  - id: aprofundamento-template
    file: templates/aprofundamento-template.md
    description: Template de aprofundamento — ângulos novos para pessoa já na lista

# Tasks
tasks:
  - id: pesquisar-alvos
    file: tasks/01-pesquisar-alvos.md
    description: Pesquisar candidatos para matéria-colab, formular ângulos, aplicar gate e exclusões

  - id: atualizar-lista
    file: tasks/02-atualizar-lista.md
    description: Adicionar candidatos/ângulos aprovados à lista ativa (suporta Modo A e Modo B)

  - id: aprofundar-pessoa
    file: tasks/03-aprofundar-pessoa.md
    description: Gerar ângulos novos para pessoa que já está na lista ativa

  - id: persistir-supabase
    file: tasks/04-persistir-supabase.md
    description: Salvar pessoa + ângulos aprovados no Supabase (CLI save-distribuicao-cli.js)

# Checkpoints humanos
checkpoints:
  - step-02: "Aprovação dos candidatos pesquisados e ângulos (Modo 1)"
  - step-A2: "Aprovação de ângulos novos para pessoa existente (Modo 2)"
  - step-04: "Confirmação da lista atualizada (ambos os modos)"
  - step-05: "Persistência no Supabase (ambos os modos)"
