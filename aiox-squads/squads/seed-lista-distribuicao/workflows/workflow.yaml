# Workflow: Seed Lista de Distribuição
# Pipeline de pesquisa e manutenção de alvos para matéria-colab
# v1.0

name: seed-lista-distribuicao
version: "1.0"
description: >
  Pipeline para pesquisar candidatos para matéria-colab,
  aplicar gate da lente, filtrar exclusões e manter lista ativa.

# ─── Steps ─────────────────────────────────────────────────

steps:

  # ─── PESQUISA ────────────────────────────────────────────
  - id: step-01-pesquisar
    name: "Pesquisar Alvos"
    agent: pesquisador-alvos
    task: tasks/01-pesquisar-alvos.md
    data:
      - data/linkedin-strategy.md
      - data/exclusions.md
      - data/gate-rules.md
    input: direcao-do-thiago
    output: output/candidatos-pesquisados.md
    description: >
      Paulo pesquisa candidatos para matéria-colab. Aplica gate da lente
      (título formulável?) e filtra exclusões (arquétipos vetados, duplicatas).
    next: step-02-aprovacao

  # ─── APROVAÇÃO ───────────────────────────────────────────
  - id: step-02-aprovacao
    name: "⏸️ CHECKPOINT — Aprovação dos Candidatos"
    type: human-checkpoint
    description: >
      Thiago revisa os candidatos pesquisados. Para cada:
      ✅ Aprovar (entra na lista)
      ❌ Descartar (vai pra exclusões com motivo)
    input: output/candidatos-pesquisados.md
    output: candidatos-aprovados
    next: step-03-atualizar

  # ─── ATUALIZAÇÃO ─────────────────────────────────────────
  - id: step-03-atualizar
    name: "Atualizar Lista"
    agent: pesquisador-alvos
    task: tasks/02-atualizar-lista.md
    input:
      - output/candidatos-pesquisados.md
      - candidatos-aprovados
    output: output/lista-distribuicao.md
    description: >
      Paulo adiciona candidatos aprovados à lista ativa e registra
      descartados nas exclusões com motivo.
    next: step-04-confirmacao

  # ─── CONFIRMAÇÃO ─────────────────────────────────────────
  - id: step-04-confirmacao
    name: "⏸️ CHECKPOINT — Confirmação da Lista"
    type: human-checkpoint
    description: >
      Thiago confirma que a lista atualizada está correta.
      Vê resumo: total, novos, % fora da bolha.
    input: output/lista-distribuicao.md
    output: lista-confirmada

# ─── Resumo do Pipeline ───────────────────────────────────
# step-01 → step-02 (aprovação) → step-03 (atualizar) → step-04 (confirmação)

# ─── Checkpoints ──────────────────────────────────────────
# step-02: Aprovação/descarte de candidatos
# step-04: Confirmação da lista atualizada
