<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8F8F8;
      color: #1A1A1A;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      padding: 64px 80px 56px;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .profile-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 600;
      color: #999;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 48px;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: #2563EB;
      border-radius: 2px;
    }

    .big-number {
      font-size: 140px;
      font-weight: 900;
      line-height: 1;
      color: #2563EB;
      letter-spacing: -0.04em;
    }

    .big-context {
      font-size: 30px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 8px;
    }

    .hero-text {
      font-size: 46px;
      font-weight: 800;
      line-height: 1.2;
      color: #1A1A1A;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: #2563EB;
    }

    .body-text {
      font-size: 34px;
      font-weight: 500;
      line-height: 1.5;
      color: #555;
    }

    .source {
      font-size: 22px;
      font-weight: 500;
      color: #AAA;
      font-style: italic;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid #E0E0E0;
    }

    .footer-brand {
      font-size: 18px;
      font-weight: 600;
      color: #AAAAAA;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .swipe-hint {
      font-size: 20px;
      font-weight: 500;
      color: #AAAAAA;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar">
      <img class="profile-photo" src="profile-photo.png" alt="">
      <span class="profile-name">Thiago C.Lima</span>
    </div>

    <div class="content">
      <div class="divider"></div>

      <div>
        <span class="big-number">1 em 3</span>
        <p class="big-context">empresas conseguiram escalar IA</p>
      </div>

      <h2 class="hero-text">
        As outras 2?<br>
        Ficaram no <span class="highlight">piloto infinito.</span>
      </h2>

      <p class="body-text">
        Testando, testando —<br>sem integrar no processo real.
      </p>

      <span class="source">— McKinsey, 2024</span>
    </div>

    <div class="footer">
      <span class="footer-brand">Thiago C.Lima</span>
      <span class="swipe-hint">Deslize →</span>
    </div>
  </div>
</body>
</html>
