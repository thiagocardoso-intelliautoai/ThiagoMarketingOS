<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8F8F8;
      color: #1A1A1A;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      padding: 64px 80px 56px;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .profile-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 600;
      color: #999;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 44px;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: #2563EB;
      border-radius: 2px;
    }

    .hero-text {
      font-size: 48px;
      font-weight: 800;
      line-height: 1.15;
      color: #1A1A1A;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: #2563EB;
    }

    .stat-card {
      background: #FFFFFF;
      border: 1px solid #E5E5E5;
      border-radius: 16px;
      padding: 36px 40px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-number {
      font-size: 72px;
      font-weight: 900;
      color: #2563EB;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat-label {
      font-size: 20px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .stat-desc {
      font-size: 30px;
      font-weight: 500;
      color: #444;
      line-height: 1.4;
      margin-top: 4px;
    }

    .stats-row {
      display: flex;
      gap: 24px;
    }

    .stats-row .stat-card {
      flex: 1;
    }

    .stats-row .stat-number {
      font-size: 64px;
    }

    .body-text {
      font-size: 34px;
      font-weight: 600;
      line-height: 1.45;
      color: #333;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid #E0E0E0;
    }

    .footer-brand {
      font-size: 18px;
      font-weight: 600;
      color: #AAAAAA;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .swipe-hint {
      font-size: 20px;
      font-weight: 500;
      color: #AAAAAA;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar">
      <img class="profile-photo" src="profile-photo.png" alt="">
      <span class="profile-name">Thiago C.Lima</span>
    </div>

    <div class="content">
      <div class="divider"></div>

      <h2 class="hero-text">
        O custo que<br>ninguém calcula:
      </h2>

      <div class="stat-card">
        <span class="stat-label">Marketing</span>
        <span class="stat-number">26%</span>
        <span class="stat-desc">já reportam <span class="highlight" style="font-weight: 700;">"AI Brain Fry"</span></span>
      </div>

      <div class="stat-card">
        <span class="stat-label">Operações</span>
        <span class="stat-number">18%</span>
        <span class="stat-desc">reportam o mesmo efeito</span>
      </div>

      <p class="body-text">
        Fadiga mental por supervisionar<br>output de IA o dia inteiro.
      </p>
    </div>

    <div class="footer">
      <span class="footer-brand">Thiago C.Lima</span>
      <span class="swipe-hint">Deslize →</span>
    </div>
  </div>
</body>
</html>
