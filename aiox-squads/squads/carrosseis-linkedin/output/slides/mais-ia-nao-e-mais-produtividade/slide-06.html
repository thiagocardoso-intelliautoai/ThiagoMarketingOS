<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8F8F8;
      color: #1A1A1A;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      padding: 64px 80px 56px;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .profile-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 600;
      color: #999;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 48px;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: #2563EB;
      border-radius: 2px;
    }

    .hero-text {
      font-size: 50px;
      font-weight: 800;
      line-height: 1.15;
      color: #1A1A1A;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: #2563EB;
    }

    .checklist {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px 32px;
      background: #FFFFFF;
      border: 1px solid #E5E5E5;
      border-radius: 12px;
    }

    .check-icon {
      font-size: 34px;
      color: #2563EB;
      flex-shrink: 0;
      width: 44px;
      text-align: center;
    }

    .check-text {
      font-size: 34px;
      font-weight: 600;
      color: #1A1A1A;
      line-height: 1.3;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid #E0E0E0;
    }

    .footer-brand {
      font-size: 18px;
      font-weight: 600;
      color: #AAAAAA;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .swipe-hint {
      font-size: 20px;
      font-weight: 500;
      color: #AAAAAA;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar">
      <img class="profile-photo" src="profile-photo.png" alt="">
      <span class="profile-name">Thiago C.Lima</span>
    </div>

    <div class="content">
      <div class="divider"></div>

      <h2 class="hero-text">
        A tendência não é<br>adotar mais. É <span class="highlight">consolidar.</span>
      </h2>

      <div class="checklist">
        <div class="check-item">
          <span class="check-icon">✅</span>
          <span class="check-text">Escolher <span class="highlight">UMA</span> ferramenta</span>
        </div>
        <div class="check-item">
          <span class="check-icon">✅</span>
          <span class="check-text">Ir fundo</span>
        </div>
        <div class="check-item">
          <span class="check-icon">✅</span>
          <span class="check-text">Integrar no workflow</span>
        </div>
        <div class="check-item">
          <span class="check-icon">✅</span>
          <span class="check-text">Só depois pensar na próxima</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <span class="footer-brand">Thiago C.Lima</span>
      <span class="swipe-hint">Deslize →</span>
    </div>
  </div>
</body>
</html>
