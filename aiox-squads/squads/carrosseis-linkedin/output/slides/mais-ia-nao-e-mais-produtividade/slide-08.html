<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8F8F8;
      color: #1A1A1A;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      padding: 64px 80px 56px;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .profile-photo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: -0.02em;
    }

    .profile-handle {
      font-size: 17px;
      font-weight: 400;
      color: #888;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 44px;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: #2563EB;
      border-radius: 2px;
    }

    .cta-text {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.15;
      color: #1A1A1A;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: #2563EB;
    }

    .cta-sub {
      font-size: 36px;
      font-weight: 500;
      line-height: 1.45;
      color: #666;
    }

    .cta-button {
      display: inline-block;
      background: #2563EB;
      color: #FFFFFF;
      font-size: 28px;
      font-weight: 700;
      padding: 20px 48px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: -0.01em;
      align-self: flex-start;
    }

    .signature {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sig-name {
      font-size: 26px;
      font-weight: 700;
      color: #1A1A1A;
    }

    .sig-title {
      font-size: 22px;
      font-weight: 500;
      color: #888;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid #E0E0E0;
    }

    .footer-brand {
      font-size: 18px;
      font-weight: 600;
      color: #AAAAAA;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .footer-follow {
      font-size: 20px;
      font-weight: 600;
      color: #2563EB;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar">
      <img class="profile-photo" src="profile-photo.png" alt="Thiago C.Lima">
      <div class="profile-info">
        <span class="profile-name">Thiago C.Lima</span>
        <span class="profile-handle">@othiago-clima</span>
      </div>
    </div>

    <div class="content">
      <div class="divider"></div>

      <h2 class="cta-text">
        Qual é a <span class="highlight">UMA</span> ferramenta<br>de IA que fez diferença<br>real no seu time?
      </h2>

      <p class="cta-sub">
        Me conta nos comentários.
      </p>

      <span class="cta-button">💬 Comentar</span>

      <div class="signature">
        <span class="sig-name">— Thiago C.Lima</span>
        <span class="sig-title">Head de Automação e IA | Winning Sales</span>
      </div>
    </div>

    <div class="footer">
      <span class="footer-brand">Thiago C.Lima</span>
      <span class="footer-follow">Seguir +</span>
    </div>
  </div>
</body>
</html>
