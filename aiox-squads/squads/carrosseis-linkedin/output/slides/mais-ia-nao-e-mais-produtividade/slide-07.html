<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8F8F8;
      color: #1A1A1A;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      padding: 64px 80px 56px;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .profile-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 20px;
      font-weight: 600;
      color: #999;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 48px;
    }

    .divider {
      width: 80px;
      height: 4px;
      background: #2563EB;
      border-radius: 2px;
    }

    .hero-text {
      font-size: 72px;
      font-weight: 800;
      line-height: 1.05;
      color: #1A1A1A;
      letter-spacing: -0.03em;
    }

    .highlight {
      color: #2563EB;
    }

    .accent-bar {
      border-left: 5px solid #2563EB;
      padding-left: 28px;
    }

    .body-text {
      font-size: 36px;
      font-weight: 500;
      line-height: 1.5;
      color: #555;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid #E0E0E0;
    }

    .footer-brand {
      font-size: 18px;
      font-weight: 600;
      color: #AAAAAA;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .swipe-hint {
      font-size: 20px;
      font-weight: 500;
      color: #AAAAAA;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top-bar">
      <img class="profile-photo" src="profile-photo.png" alt="">
      <span class="profile-name">Thiago C.Lima</span>
    </div>

    <div class="content">
      <div class="divider"></div>

      <h2 class="hero-text">
        <span class="highlight">Profundidade</span><br>vence<br>amplitude.
      </h2>

      <p class="hero-text" style="font-size: 56px; color: #999; font-weight: 700;">
        Sempre.
      </p>

      <div class="accent-bar">
        <p class="body-text">
          As empresas que cresceram em 2026<br>fizeram o oposto do que o mercado mandava.
        </p>
      </div>
    </div>

    <div class="footer">
      <span class="footer-brand">Thiago C.Lima</span>
      <span class="swipe-hint">Deslize →</span>
    </div>
  </div>
</body>
</html>
