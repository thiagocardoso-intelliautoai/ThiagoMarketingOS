<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #000000;
  color: #FFFFFF;
  width: 1080px;
  height: 1350px;
  overflow: hidden;
}

.slide {
  width: 1080px;
  height: 1350px;
  padding: 64px;
  display: flex;
  flex-direction: column;
}

.profile {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 0;
}

.profile-photo {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
}

.profile-name {
  font-size: 26px;
  font-weight: 700;
  color: #FFFFFF;
}

.profile-handle {
  font-size: 20px;
  font-weight: 400;
  color: #8B8B8B;
}

.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.hero-text {
  font-size: 58px;
  font-weight: 700;
  line-height: 1.2;
  color: #FFFFFF;
}

.body-text {
  font-size: 40px;
  font-weight: 500;
  line-height: 1.45;
  color: #E0E0E0;
}

.highlight {
  color: #FFD700;
  font-weight: 700;
}

.accent-line {
  width: 80px;
  height: 4px;
  background: #FFD700;
  margin: 32px 0;
  border-radius: 2px;
}

.footer {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding-top: 24px;
}

.swipe-hint {
  font-size: 22px;
  font-weight: 500;
  color: #555555;
}

  .content { gap: 0; }
</style>
