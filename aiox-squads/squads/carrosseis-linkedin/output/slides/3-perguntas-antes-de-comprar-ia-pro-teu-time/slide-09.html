<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F4F4F5;
      color: #18181B;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
    }
    .slide {
      width: 1080px;
      height: 1350px;
      padding: 64px 80px 56px;
      display: flex;
      flex-direction: column;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .profile-photo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    .profile-name {
      font-size: 22px;
      font-weight: 700;
      color: #18181B;
      letter-spacing: -0.02em;
    }
    .profile-handle {
      font-size: 17px;
      font-weight: 400;
      color: #888888;
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 48px;
    }
    .divider {
      width: 80px;
      height: 4px;
      background: #14B8A6;
    }
    .contrast-block {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .line-muted {
      font-size: 40px;
      font-weight: 500;
      line-height: 1.3;
      color: #94A3B8;
      letter-spacing: -0.02em;
    }
    .line-bold {
      font-size: 54px;
      font-weight: 800;
      line-height: 1.1;
      color: #18181B;
      letter-spacing: -0.03em;
    }
    .line-accent {
      font-size: 54px;
      font-weight: 800;
      line-height: 1.1;
      color: #14B8A6;
      letter-spacing: -0.03em;
    }
    .separator {
      width: 100%;
      height: 1px;
      background: #E2E2E3;
    }
    .cta-text {
      font-size: 36px;
      font-weight: 600;
      line-height: 1.4;
      color: #444444;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid #E2E2E3;
    }
    .footer-brand {
      font-size: 18px;
      font-weight: 600;
      color: #94A3B8;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="profile">
      <img class="profile-photo" src="profile-photo.png" alt="Thiago C.Lima">
      <div>
        <div class="profile-name">Thiago C.Lima</div>
        <div class="profile-handle">@othiago-clima</div>
      </div>
    </div>

    <div class="content">
      <div class="divider"></div>

      <div class="contrast-block">
        <p class="line-muted">Ferramenta tu compra.</p>
        <p class="line-muted">E o concorrente compra também.</p>
      </div>

      <div class="separator"></div>

      <div class="contrast-block">
        <p class="line-bold">Cultura tu constrói.</p>
        <p class="line-accent">E ninguém replica.</p>
      </div>

      <p class="cta-text">Quer trocar ideia sobre isso?<br>Me chama.</p>
    </div>

    <div class="footer">
      <span class="footer-brand">Thiago C.Lima</span>
    </div>
  </div>
</body>
</html>
