<!--
  Template Base: Editorial Clean — Carrosséis LinkedIn
  Squad: carrosseis-linkedin
  Viewport: 1080 x 1350 (4:5, otimizado para feed LinkedIn)
  
  INSTRUÇÕES PARA O DESIGNER (Denis Design):
  1. Use este template como BASE — personalize para cada carrossel
  2. Estilo premium/editorial: fundo claro, tipografia bold, whitespace generoso
  3. Cor de accent personalizável por carrossel (default: azul editorial #2563EB)
  4. Barra lateral em accent para citações e dados-chave
  5. 100% tipografia — sem imagens decorativas
  6. HTML self-contained (sem dependências externas exceto Google Fonts)
  7. Renderizar via Playwright para PNG
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #F4F4F5;
      color: #18181B;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Header: Perfil ── */
    .profile {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .profile-photo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 700;
      color: #18181B;
      letter-spacing: -0.02em;
    }

    .profile-handle {
      font-size: 17px;
      font-weight: 400;
      color: #888888;
    }

    /* ── Conteúdo ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
    }

    .hero-text {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.12;
      color: #18181B;
      letter-spacing: -0.03em;
    }

    .body-text {
      font-size: 36px;
      font-weight: 500;
      line-height: 1.45;
      color: #444444;
    }

    /* ── Accent (cor personalizável por carrossel) ── */
    .highlight {
      color: #14B8A6;
      font-weight: 800;
    }

    /* ── Barra Lateral de Citação/Dado ── */
    .accent-bar {
      border-left: 5px solid #14B8A6;
      padding-left: 28px;
      margin: 8px 0;
    }

    .accent-bar .body-text {
      color: #18181B;
      font-weight: 600;
    }

    /* ── Separador ── */
    .divider {
      width: 80px;
      height: 4px;
      background: #14B8A6;
      border-radius: 2px;
    }

    /* ── Lista ── */
    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    .list-marker {
      font-size: 36px;
      font-weight: 800;
      color: #14B8A6;
      min-width: 44px;
    }

    .list-text {
      font-size: 34px;
      font-weight: 500;
      line-height: 1.4;
      color: #333333;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid #E5E5E5;
    }

    .footer-brand {
      font-size: 18px;
      font-weight: 600;
      color: #94A3B8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .swipe-hint {
      font-size: 20px;
      font-weight: 500;
      color: #94A3B8;
    }

    /* ── CTA (Último Slide) ── */
    .cta-container {
      text-align: left;
    }

    .cta-text {
      font-size: 48px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 40px;
      color: #18181B;
      letter-spacing: -0.02em;
    }

    .cta-button {
      display: inline-block;
      background: #14B8A6;
      color: #FFFFFF;
      font-size: 28px;
      font-weight: 700;
      padding: 18px 44px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════
       SLIDE: Editorial Clean — Hook
       ═══════════════════════════════════════════ -->
  <div class="slide">
    <div class="profile">
      <img class="profile-photo" src="assets/profile-photo.png" alt="Thiago C.Lima">
      <div class="profile-info">
        <span class="profile-name">Thiago C.Lima</span>
        <span class="profile-handle">@othiago-clima</span>
      </div>
    </div>

    <div class="content">
      <div class="divider"></div>

      <h1 class="hero-text">
        <!-- HOOK: max 210 chars -->
        Seu texto de hook vai aqui.
        <span class="highlight">Destaque</span> em azul.
      </h1>

      <div class="accent-bar">
        <p class="body-text">
          Dado ou citação de impacto aqui.
        </p>
      </div>
    </div>

    <div class="footer">
      <span class="footer-brand">Thiago C.Lima</span>
      <span class="swipe-hint">Deslize →</span>
    </div>
  </div>
</body>
</html>
