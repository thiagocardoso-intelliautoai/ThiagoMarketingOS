<!--
  Template Base: Notebook Raw — Carrosséis LinkedIn
  Squad: carrosseis-linkedin
  Viewport: 1080 x 1350 (4:5, otimizado para feed LinkedIn)
  
  INSTRUÇÕES PARA O DESIGNER (Denis Design):
  1. Use este template como BASE — personalize para cada carrossel
  2. Estética caderno/anotação: fundo de papel, tipografia que simula escrita manual
  3. Caveat (Google Font) para hero/destaques — Inter para body legível
  4. Elementos "imperfeitos": sublinhados tilted, boxes dashed, rotações sutis
  5. ANTI-perfeição mas ELEGANTE — nunca sujo, sempre intencional
  6. HTML self-contained (sem dependências externas exceto Google Fonts)
  7. Renderizar via Playwright para PNG

  REGRAS ANTI-AI:
  - Sem gradientes complexos ou radiais
  - Sem simetria perfeita — use transform rotate(-0.3deg a 0.8deg)
  - Sem paletas "douradas" de AI — use cores de caneta real (vermelho marker, azul bic, preto)
  - Texturas sutis via CSS (noise/grain pattern)
  - Linhas de caderno em background (opcional, se elegante)
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      position: relative;
    }

    /* ── Fundo: Papel craft com textura ── */
    .paper-bg {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
      background-color: #F5F0E8;
      /* Grain/noise sutil via CSS */
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 44px,
          rgba(180, 170, 155, 0.12) 44px,
          rgba(180, 170, 155, 0.12) 45px
        );
    }

    /* ── Margem vertical esquerda (estilo caderno) ── */
    .paper-bg::before {
      content: '';
      position: absolute;
      left: 96px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(200, 80, 80, 0.15);
      z-index: 2;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      padding: 72px 80px;
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .topic-tag {
      font-family: 'Caveat', cursive;
      font-size: 26px;
      font-weight: 600;
      color: #2B6CB0;
      background: rgba(43, 108, 176, 0.08);
      padding: 6px 18px;
      border-radius: 4px;
      transform: rotate(-0.5deg);
      display: inline-block;
    }

    .page-corner {
      font-family: 'Caveat', cursive;
      font-size: 24px;
      color: #999;
    }

    /* ── Conteúdo ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
      padding-left: 32px;
    }

    /* ── Hero: tipografia handwriting ── */
    .hero-text {
      font-family: 'Caveat', cursive;
      font-size: 58px;
      font-weight: 700;
      line-height: 1.15;
      color: #2D2D2D;
      transform: rotate(-0.3deg);
    }

    /* ── Body: tipografia legível ── */
    .body-text {
      font-family: 'Inter', sans-serif;
      font-size: 34px;
      font-weight: 500;
      line-height: 1.5;
      color: #444444;
    }

    /* ── Sublinhado marker (vermelho) ── */
    .underline-marker {
      display: inline;
      background-image: linear-gradient(
        to right,
        rgba(229, 62, 62, 0.35) 0%,
        rgba(229, 62, 62, 0.35) 100%
      );
      background-repeat: no-repeat;
      background-size: 100% 8px;
      background-position: 0% 88%;
      font-weight: 700;
      color: #2D2D2D;
    }

    /* ── Highlight em azul (caneta) ── */
    .highlight-pen {
      color: #2B6CB0;
      font-weight: 700;
    }

    /* ── Box dashed (anotação lateral) ── */
    .note-box {
      border: 2px dashed #B0A090;
      border-radius: 6px;
      padding: 24px 28px;
      transform: rotate(0.3deg);
      position: relative;
    }

    .note-box::before {
      content: '📌';
      position: absolute;
      top: -14px;
      left: 20px;
      font-size: 22px;
    }

    .note-box .body-text {
      font-size: 30px;
      color: #555555;
    }

    /* ── Seta rabiscada (Unicode) ── */
    .arrow-scribble {
      font-family: 'Caveat', cursive;
      font-size: 40px;
      color: #E53E3E;
      transform: rotate(-2deg);
      display: inline-block;
      margin: 8px 0;
    }

    /* ── Lista com markers manuais ── */
    .list-handwritten {
      list-style: none;
      padding: 0;
    }

    .list-handwritten li {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 500;
      line-height: 1.5;
      color: #444444;
      padding-left: 32px;
      position: relative;
      margin-bottom: 12px;
    }

    .list-handwritten li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #E53E3E;
      font-family: 'Caveat', cursive;
      font-size: 36px;
      font-weight: 700;
    }

    /* ── Número circulado (passo a passo) ── */
    .step-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border: 3px solid #2B6CB0;
      border-radius: 50%;
      font-family: 'Caveat', cursive;
      font-size: 32px;
      font-weight: 700;
      color: #2B6CB0;
      flex-shrink: 0;
      transform: rotate(-1deg);
    }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }

    .step-text {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 500;
      line-height: 1.4;
      color: #444444;
      padding-top: 6px;
    }

    /* ── Risco / strikethrough manual ── */
    .crossed-out {
      text-decoration: line-through;
      text-decoration-color: #E53E3E;
      text-decoration-thickness: 3px;
      color: #999;
    }

    /* ── Footer: Assinatura ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .signature {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 600;
      color: #888;
      transform: rotate(-1deg);
    }

    .swipe-hint {
      font-family: 'Caveat', cursive;
      font-size: 24px;
      color: #B0A090;
      transform: rotate(0.5deg);
    }

    /* ── CTA (Último Slide) ── */
    .cta-text {
      font-family: 'Caveat', cursive;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 32px;
      color: #2D2D2D;
      transform: rotate(-0.5deg);
    }

    .cta-action {
      font-family: 'Inter', sans-serif;
      display: inline-block;
      background: #2D2D2D;
      color: #F5F0E8;
      font-size: 26px;
      font-weight: 700;
      padding: 16px 40px;
      border-radius: 6px;
      text-decoration: none;
      transform: rotate(0.3deg);
    }
  </style>
</head>
<body>
  <!-- ═══════════════════════════════════════════
       SLIDE: Notebook Raw — Hook
       ═══════════════════════════════════════════ -->
  <div class="paper-bg"></div>

  <div class="slide">
    <div class="header">
      <span class="topic-tag"># IA no Campo</span>
      <span class="page-corner">mar/2026</span>
    </div>

    <div class="content">
      <h1 class="hero-text">
        <!-- HOOK: max 210 chars, estilo "anotação" -->
        Seu texto de hook vai aqui —
        <span class="underline-marker">destaque</span> com marker.
      </h1>

      <div class="arrow-scribble">↓ isso aqui é sério</div>

      <div class="note-box">
        <p class="body-text">
          Dado ou insight complementar aqui, como uma anotação lateral.
        </p>
      </div>
    </div>

    <div class="footer">
      <span class="signature">— Thiago C.Lima</span>
      <span class="swipe-hint">vira a página →</span>
    </div>
  </div>
</body>
</html>
