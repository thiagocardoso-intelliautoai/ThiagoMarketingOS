<!--
  Cover: Quote Card — "Tecnologia elimina tarefa, não profissão"
  Squad: capas-linkedin
  Viewport: 1080 x 1350 (4:5, otimizado para feed LinkedIn/Instagram)
  Estilo: 5 — Quote Card (citação editorial premium)
  
  Design System:
  - Background: #0A0A0A → #1A1A2E (145°)
  - Accent: #FBBF24 (amber/gold)
  - Text Primary: #F3F4F6 (contraste 19.7:1)
  - Text Secondary: #9CA3AF
  - Font: Inter 46px/500 italic (citação), Inter 22px/600 (atribuição)
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #0A0A0A;
      background: linear-gradient(145deg, #0A0A0A 0%, #0E0E1A 30%, #1A1A2E 65%, #12121F 85%, #0A0A0A 100%);
    }

    .cover {
      width: 1080px;
      height: 1350px;
      padding: 100px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      position: relative;
    }

    /* ── Textura de noise (CSS puro) ── */
    .noise {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 1;
    }

    /* ── Glow sutil atrás da citação ── */
    .glow {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(251, 191, 36, 0.04) 0%, transparent 70%);
      z-index: 1;
    }

    /* ── Aspas decorativas ── */
    .quote-mark-open {
      position: absolute;
      top: 200px;
      left: 55px;
      font-size: 220px;
      font-weight: 800;
      line-height: 1;
      color: rgba(251, 191, 36, 0.08);
      z-index: 2;
      font-family: Georgia, 'Times New Roman', serif;
      user-select: none;
    }

    .quote-mark-close {
      position: absolute;
      bottom: 320px;
      right: 70px;
      font-size: 220px;
      font-weight: 800;
      line-height: 1;
      color: rgba(251, 191, 36, 0.05);
      z-index: 2;
      font-family: Georgia, 'Times New Roman', serif;
      user-select: none;
      transform: rotate(180deg);
    }

    /* ── Barra lateral de acento ── */
    .accent-bar {
      position: absolute;
      left: 56px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 320px;
      background: linear-gradient(180deg, transparent 0%, #FBBF24 20%, #F59E0B 50%, #FBBF24 80%, transparent 100%);
      border-radius: 2px;
      z-index: 2;
    }

    /* ── Contexto / Tagline superior ── */
    .context-tag {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #FBBF24;
      z-index: 3;
      padding-left: 32px;
      margin-bottom: 48px;
      opacity: 0.85;
    }

    /* ── Citação ── */
    .quote-text {
      font-size: 52px;
      font-weight: 500;
      font-style: italic;
      line-height: 1.3;
      color: #F3F4F6;
      z-index: 3;
      max-width: 860px;
      padding-left: 32px;
      letter-spacing: -0.015em;
    }

    .quote-text .highlight {
      font-weight: 700;
      color: #FBBF24;
    }

    /* ── Separador ── */
    .divider {
      width: 72px;
      height: 3px;
      background: linear-gradient(90deg, #FBBF24, #F59E0B);
      border-radius: 2px;
      margin: 52px 0 40px 32px;
      z-index: 3;
    }

    /* ── Atribuição ── */
    .attribution {
      display: flex;
      align-items: center;
      gap: 18px;
      padding-left: 32px;
      z-index: 3;
    }

    .attr-photo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(251, 191, 36, 0.35);
    }

    .attr-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .attr-name {
      font-size: 22px;
      font-weight: 600;
      color: #D1D5DB;
      font-style: normal;
    }

    .attr-role {
      font-size: 17px;
      font-weight: 400;
      color: #6B7280;
      font-style: normal;
    }

    /* ── Rodapé discreto ── */
    .footer {
      position: absolute;
      bottom: 48px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      z-index: 3;
    }

    .footer-line {
      width: 32px;
      height: 1px;
      background: rgba(251, 191, 36, 0.2);
    }

    .footer-text {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(156, 163, 175, 0.4);
      font-style: normal;
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="noise"></div>
    <div class="glow"></div>

    <!-- Aspas decorativas (elemento gráfico, não texto) -->
    <div class="quote-mark-open">"</div>
    <div class="quote-mark-close">"</div>

    <!-- Barra lateral de acento -->
    <div class="accent-bar"></div>

    <!-- Contexto -->
    <div class="context-tag">Lição da história</div>

    <!-- CITAÇÃO -->
    <blockquote class="quote-text">
      "Tecnologia elimina <span class="highlight">tarefa</span>,
      não <span class="highlight">profissão</span>."
    </blockquote>

    <div class="divider"></div>

    <!-- ATRIBUIÇÃO -->
    <div class="attribution">
      <img class="attr-photo" src="profile-photo.png" alt="Thiago C.Lima">
      <div class="attr-info">
        <span class="attr-name">Thiago C.Lima</span>
        <span class="attr-role">Head de Automação e IA — Winning Sales</span>
      </div>
    </div>

    <!-- Rodapé -->
    <div class="footer">
      <div class="footer-line"></div>
      <span class="footer-text">@othiago-clima</span>
      <div class="footer-line"></div>
    </div>
  </div>
</body>
</html>
