<!--
  Capa: IA virou cultura no nosso time
  Estilo: 2 — Pessoa + Texto
  Viewport: 1080 x 1350 (4:5)
  Foto: team-photo.png (time Winning Sales em sala de reunião com dashboard)

  Design System:
  - Fundo: Foto time (sala de reunião, dashboard na tela ao fundo)
  - Overlay: Gradient bottom-heavy — preserva time visível, protege texto
  - Hero: Inter 800, 64px, #FFFFFF / "cultura." em #14B8A6 (Teal)
  - Accent line: 56px × 3px, #14B8A6 — único elemento decorativo
  - Brand: foto perfil + nome + handle, rodapé
  - Hierarquia: tipografia + peso, zero efeitos

  Anti-AI Compliance:
  ✅ Zero gradient text fill (cores flat)
  ✅ Zero radial glow
  ✅ Zero ícones literais
  ✅ Assimetria intencional (left-aligned, terço inferior)
  ✅ 1 elemento decorativo (accent line) — abaixo do limite de 2
  ✅ Accent flat sólido (Teal #14B8A6)
  ✅ 30%+ espaço negativo
  ✅ Paleta não-óbvia (Teal + branco sobre foto)
  ✅ Cores do Design System global
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      position: relative;
      background: #111;
    }

    .cover {
      width: 1080px;
      height: 1350px;
      position: relative;
    }

    /* ── Background: Foto time Winning Sales ── */
    .bg-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* ── Overlay — preserva time no centro, escurece rodapé para texto ── */
    .overlay {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 2;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.06) 0%,
        rgba(0, 0, 0, 0.18) 38%,
        rgba(0, 0, 0, 0.68) 68%,
        rgba(0, 0, 0, 0.91) 100%
      );
    }

    /* ── Conteúdo ancorado no rodapé ── */
    .content-wrapper {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 3;
      padding: 0 72px 64px 72px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    /* ── Marca ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .brand-photo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.40);
      flex-shrink: 0;
    }

    .brand-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-name {
      font-size: 21px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.90);
      letter-spacing: 0.01em;
    }

    .brand-handle {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.48);
    }

    /* ── Linha de acento (único elemento decorativo) ── */
    .accent-line {
      width: 56px;
      height: 3px;
      background: #14B8A6;
      margin-bottom: 28px;
    }

    /* ── Hero text ── */
    .hero-text {
      font-size: 64px;
      font-weight: 800;
      line-height: 1.08;
      color: #FFFFFF;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.55);
    }

    .accent {
      color: #14B8A6;
    }
  </style>
</head>
<body>
  <div class="cover">
    <!-- Foto do time (sala de reunião com dashboard) -->
    <img class="bg-photo" src="team-photo.png" alt="Time Winning Sales">

    <!-- Overlay de contraste -->
    <div class="overlay"></div>

    <!-- Conteúdo -->
    <div class="content-wrapper">

      <div class="brand">
        <img class="brand-photo" src="profile-photo.png" alt="Thiago C.Lima">
        <div class="brand-info">
          <span class="brand-name">Thiago C.Lima</span>
          <span class="brand-handle">@othiago-clima</span>
        </div>
      </div>

      <div class="accent-line"></div>

      <h1 class="hero-text">
        IA virou<br><span class="accent">cultura.</span>
      </h1>

    </div>
  </div>
</body>
</html>
