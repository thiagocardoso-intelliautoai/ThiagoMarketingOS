<!--
  Template: Bold Statement — Capas LinkedIn/Instagram
  Squad: capas-linkedin
  Viewport: 1080 x 1350 (4:5, otimizado para feed)
  
  INSTRUÇÕES PARA O DESIGNER (Dani Design):
  1. Use este template como BASE — personalize para cada capa
  2. Substituir texto do hero com a frase de impacto do post
  3. Palavra-chave em destaque com cor de acento
  4. Máximo 15-20 palavras
  5. HTML self-contained (sem dependências externas exceto Google Fonts)
  6. Renderizar via Playwright para PNG (1080x1350)
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #1A1A2E;
    }

    .cover {
      width: 1080px;
      height: 1350px;
      padding: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      position: relative;
    }

    /* ── Noise texture sutil (Anti-AI: substituiu radial glow) ── */
    .cover::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* ── Texto principal ── */
    .hero-text {
      font-size: 56px;
      font-weight: 700;
      line-height: 1.2;
      color: #FFFFFF;
      text-align: left;
      z-index: 2;
      max-width: 900px;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: #14B8A6;
      font-weight: 800;
    }

    /* ── Linha decorativa ── */
    .divider {
      width: 80px;
      height: 4px;
      background: #14B8A6;
      border-radius: 2px;
      margin-top: 48px;
      z-index: 2;
    }

    /* ── Marca ── */
    .brand {
      position: absolute;
      bottom: 60px;
      left: 80px;
      transform: none;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2;
    }

    .brand-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .brand-name {
      font-size: 20px;
      font-weight: 500;
      color: #64748B;
    }
  </style>
</head>
<body>
    <div class="cover">

    <h1 class="hero-text">
      <!-- FRASE DE IMPACTO: max 15-20 palavras -->
      A maioria das empresas que
      <span class="highlight">"implementou IA"</span>
      só automatizou uma planilha.
    </h1>

    <div class="divider"></div>

    <div class="brand">
      <img class="brand-photo" src="profile-photo.png" alt="Thiago C.Lima">
      <span class="brand-name">Thiago C.Lima</span>
    </div>
  </div>
</body>
</html>
