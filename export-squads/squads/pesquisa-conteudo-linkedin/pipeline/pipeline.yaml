name: "Pesquisa e Geração de Conteúdo Pipeline"
squad: pesquisa-conteudo-linkedin

steps:
  # ==== ETAPA 1: ARMAZÉM DE IDEIAS ====
  - id: step-01-modo-operacao
    type: checkpoint
    file: pipeline/steps/step-01-modo-operacao.md

  - id: step-02-pesquisa
    type: agent
    agent: pesquisador
    file: pipeline/steps/step-02-pesquisa.md

  - id: step-03-aprovar-pesquisa
    type: checkpoint
    file: pipeline/steps/step-03-aprovar-pesquisa.md

  - id: step-04-salvar-armazem
    type: agent
    agent: pesquisador
    file: pipeline/steps/step-04-salvar-armazem.md

  # ==== ETAPA 2: AGENTE DE POST ====
  - id: step-05-selecionar-ideia
    type: checkpoint
    file: pipeline/steps/step-05-selecionar-ideia.md

  - id: step-06-criar-hook
    type: agent
    agent: redator
    file: pipeline/steps/step-06-criar-hook.md

  - id: step-07-estruturar-post
    type: agent
    agent: redator
    file: pipeline/steps/step-07-estruturar-post.md

  - id: step-08-revisao
    type: agent
    agent: revisor
    file: pipeline/steps/step-08-revisao.md
    on_reject: step-07-estruturar-post

  # ==== ETAPA 3: POSTS CRIADOS ====
  - id: step-09-post-criado
    type: checkpoint
    file: pipeline/steps/step-09-post-criado.md
