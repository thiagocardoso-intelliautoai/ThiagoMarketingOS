name: "Carrosséis LinkedIn"
code: carrosseis-linkedin
icon: 🎯
description: >
  Squad para criar carrosséis LinkedIn com 2 estilos visuais
  (Twitter-style e Pessoa-style). Recebe um tema específico,
  gera ângulos, cria copy otimizado e produz slides visuais
  em HTML/CSS renderizados via Playwright.

performance_mode: hybrid
formats:
  - linkedin-post

skills:
  - web_search
  - web_fetch

data:
  - pipeline/data/research-brief.md
  - pipeline/data/domain-framework.md
  - pipeline/data/quality-criteria.md
  - pipeline/data/output-examples.md
  - pipeline/data/anti-patterns.md
  - pipeline/data/tone-of-voice.md
  - pipeline/data/linkedin-strategy.md
  - pipeline/data/visual-styles.md

agents:
  - id: copywriter
    name: "Caio Carrossel"
    file: ./agents/copywriter.agent.md
  - id: designer
    name: "Denis Design"
    file: ./agents/designer.agent.md
  - id: reviewer
    name: "Raul Revisão"
    file: ./agents/reviewer.agent.md

pipeline:
  entry: pipeline/pipeline.yaml
  steps:
    - step-01-theme-input
    - step-02-generate-angles
    - step-03-select-angle
    - step-04-create-copy
    - step-05-approve-copy
    - step-06-create-slides
    - step-07-approve-visual
    - step-08-review
    - step-09-final-approval
  checkpoints:
    - step-01-theme-input
    - step-03-select-angle
    - step-05-approve-copy
    - step-07-approve-visual
    - step-09-final-approval
