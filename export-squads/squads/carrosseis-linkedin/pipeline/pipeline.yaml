name: "Carrosséis LinkedIn Pipeline"
squad: carrosseis-linkedin

steps:
  - id: step-01-theme-input
    type: checkpoint
    file: pipeline/steps/step-01-theme-input.md

  - id: step-02-generate-angles
    type: agent
    agent: copywriter
    file: pipeline/steps/step-02-generate-angles.md

  - id: step-03-select-angle
    type: checkpoint
    file: pipeline/steps/step-03-select-angle.md

  - id: step-04-create-copy
    type: agent
    agent: copywriter
    file: pipeline/steps/step-04-create-copy.md

  - id: step-05-approve-copy
    type: checkpoint
    file: pipeline/steps/step-05-approve-copy.md

  - id: step-06-create-slides
    type: agent
    agent: designer
    file: pipeline/steps/step-06-create-slides.md

  - id: step-07-approve-visual
    type: checkpoint
    file: pipeline/steps/step-07-approve-visual.md

  - id: step-08-review
    type: agent
    agent: reviewer
    file: pipeline/steps/step-08-review.md
    on_reject: step-04-create-copy

  - id: step-09-final-approval
    type: checkpoint
    file: pipeline/steps/step-09-final-approval.md
