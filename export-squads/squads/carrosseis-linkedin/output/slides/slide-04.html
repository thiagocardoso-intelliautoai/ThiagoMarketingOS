<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #000000;
      font-family: 'Inter', sans-serif;
      padding: 52px 64px;
      display: flex;
      flex-direction: column;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 52px;
    }
    .profile-photo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid #222;
      flex-shrink: 0;
    }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: 700; color: #FFFFFF; }
    .profile-handle { font-size: 16px; font-weight: 500; color: #6B7A8D; }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 48px;
    }

    .section-tag {
      font-size: 18px;
      font-weight: 700;
      color: #4DA6FF;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .main-headline {
      font-size: 52px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.2;
    }
    .main-headline .accent { color: #4DA6FF; }

    .trade-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .trade-card {
      border-radius: 16px;
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .trade-card.blue {
      background: #041628;
      border: 1px solid #0A3A6B;
    }
    .trade-card.red {
      background: #160404;
      border: 1px solid #5C0D0D;
    }
    .trade-label {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .trade-label.blue { color: #4DA6FF; }
    .trade-label.red  { color: #FF6B6B; }
    .trade-title {
      font-size: 32px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.2;
    }
    .trade-price {
      font-size: 26px;
      font-weight: 600;
      line-height: 1.35;
    }
    .trade-price.blue { color: #4DA6FF; }
    .trade-price.red  { color: #FF6B6B; }

    .separator {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .sep-line { flex: 1; height: 1px; background: #1A1A1A; }
    .sep-text { font-size: 20px; font-weight: 600; color: #3A4A5A; }
  </style>
</head>
<body>

  <div class="profile">
    <div class="profile-photo">
      <img src="../../assets/profile-photo.png" alt="Thiago C.Lima">
    </div>
    <div style="display:flex;flex-direction:column;gap:1px;">
      <span class="profile-name">Thiago C.Lima</span>
      <span class="profile-handle">@othiago-clima</span>
    </div>
  </div>

  <div class="content">
    <div class="section-tag">A Lei dos Trade-offs</div>
    <div class="main-headline">
      Todo <span class="accent">ativo</span> tem um<br>
      preço. Sem exceção.
    </div>

    <div class="trade-grid">
      <div class="trade-card blue">
        <div class="trade-label blue">Caminho A</div>
        <div class="trade-title">Autoridade<br>Real</div>
        <div class="trade-price blue">Preço:<br>Consistência</div>
      </div>
      <div class="trade-card red">
        <div class="trade-label red">Caminho B</div>
        <div class="trade-title">Hacks /<br>Spam</div>
        <div class="trade-price red">Preço:<br>Reputação queimada</div>
      </div>
    </div>

    <div class="separator">
      <div class="sep-line"></div>
      <div class="sep-text">Não existe meio-termo</div>
      <div class="sep-line"></div>
    </div>

    <div style="font-size:36px;font-weight:700;color:#9EB3C8;line-height:1.4;">
      Se você quer o ativo,<br>
      <span style="color:#FFFFFF;">precisa pagar o preço.</span>
    </div>
  </div>

</body>
</html>
